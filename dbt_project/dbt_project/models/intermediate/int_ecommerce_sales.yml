version: 2

models:
  - name: int_ecommerce_sales
    description: "Intermediate model that joins sales with product metadata and calculates net revenue."
    columns:
      - name: order_id
        description: "The unique identifier for the transaction."
        tests:
          - unique
          - not_null

      - name: customer_id
        description: "The ID of the customer who made the purchase."
        tests:
          - not_null
      
      - name: product_id
        description: "The ID of the product purchased."
        tests:
          - not_null

      - name: order_date
        description: "The date the order was placed."
        tests:
          - not_null
      