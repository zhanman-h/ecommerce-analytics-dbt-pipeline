version: 2

models:
  - name: fct_orders
    description: "The primary fact table for sales. One row per order line item."
    columns:
      - name: order_id
        description: "Unique identifier for the order line item."
        tests:
          - unique
          - not_null

      - name: customer_id
        description: "Foreign key to dim_customers."
        tests:
          - not_null

      - name: product_id
        description: "Foreign key to dim_products."
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_id

      - name: total_amount
        description: "The calculated revenue for this line item (price * quantity)."
        tests:
          - not_null